<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arena Battle</title>

<style>
body{
margin:0;
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
color:white;
}

canvas{
background:#1e293b;
border:4px solid white;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

#menu{
position:absolute;
text-align:center;
}

button{
padding:10px 20px;
margin:10px;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="menu">
<h2>キャラクター選択</h2>
<button onclick="startGame('fast')">スピード</button>
<button onclick="startGame('tank')">タンク</button>
<button onclick="startGame('sniper')">スナイパー</button>
</div>

<div id="ui" style="display:none">
Score: <span id="score">0</span><br>
Reload: <span id="reload">0</span><br>
Ult: <span id="ult">0</span>
</div>

<canvas id="game" width="1200" height="700"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const scoreEl=document.getElementById("score")
const reloadEl=document.getElementById("reload")
const ultEl=document.getElementById("ult")

let keys={}

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

class Character{

constructor(x,y,team,type){

this.x=x
this.y=y
this.team=team
this.type=type

this.reload=0
this.ult=0
this.hyper=false

if(type=="fast"){
this.size=20
this.speed=4
this.hp=90
this.damage=10
this.range=250
}

if(type=="tank"){
this.size=28
this.speed=2.4
this.hp=180
this.damage=14
this.range=200
}

if(type=="sniper"){
this.size=22
this.speed=2.6
this.hp=80
this.damage=30
this.range=450
}

this.maxHp=this.hp

this.aiTimer=0
this.dir=Math.random()*Math.PI*2

}

draw(){

ctx.save()

ctx.translate(this.x,this.y)

if(this.type=="fast"){
ctx.fillStyle=this.team=="blue"?"#3b82f6":"#ef4444"
ctx.beginPath()
ctx.arc(0,0,this.size,0,Math.PI*2)
ctx.fill()
}

if(this.type=="tank"){
ctx.fillStyle=this.team=="blue"?"#10b981":"#b91c1c"
ctx.fillRect(-this.size,-this.size,this.size*2,this.size*2)
}

if(this.type=="sniper"){
ctx.fillStyle=this.team=="blue"?"#8b5cf6":"#dc2626"
ctx.beginPath()
ctx.moveTo(0,-this.size)
ctx.lineTo(-this.size,this.size)
ctx.lineTo(this.size,this.size)
ctx.closePath()
ctx.fill()
}

ctx.restore()

ctx.fillStyle="white"
ctx.fillText(Math.floor(this.hp),this.x-10,this.y-this.size-10)

}

move(){

let nx=this.x
let ny=this.y

if(keys["KeyW"])ny-=this.speed
if(keys["KeyS"])ny+=this.speed
if(keys["KeyA"])nx-=this.speed
if(keys["KeyD"])nx+=this.speed

if(!hitWall(nx,ny,this.size)){

this.x=Math.max(this.size,Math.min(canvas.width-this.size,nx))
this.y=Math.max(this.size,Math.min(canvas.height-this.size,ny))

}

}

ai(){

let target=player

let dx=target.x-this.x
let dy=target.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<this.range){

let angle=Math.atan2(dy,dx)

let moveAngle=angle+Math.PI

let nx=this.x+Math.cos(moveAngle)*this.speed
let ny=this.y+Math.sin(moveAngle)*this.speed

if(!hitWall(nx,ny,this.size)){
this.x=nx
this.y=ny
}

if(this.reload<=0){

shoot(this,dx,dy)

this.reload=50

}

}else{

this.aiTimer--

if(this.aiTimer<=0){

this.dir=Math.random()*Math.PI*2
this.aiTimer=80

}

let nx=this.x+Math.cos(this.dir)*this.speed
let ny=this.y+Math.sin(this.dir)*this.speed

if(!hitWall(nx,ny,this.size)){
this.x=nx
this.y=ny
}

}

this.x=Math.max(this.size,Math.min(canvas.width-this.size,this.x))
this.y=Math.max(this.size,Math.min(canvas.height-this.size,this.y))

}

}

function shoot(char,dx,dy){

let d=Math.sqrt(dx*dx+dy*dy)

bullets.push({

x:char.x,
y:char.y,
vx:dx/d*8,
vy:dy/d*8,
team:char.team,
damage:char.hyper?char.damage*2:char.damage

})

}

function autoAim(){

let nearest=null
let dist=99999

enemies.forEach(e=>{

let d=Math.hypot(player.x-e.x,player.y-e.y)

if(d<dist){
dist=d
nearest=e
}

})

return nearest

}

function gadget(){

for(let i=0;i<8;i++){

let a=i*Math.PI*2/8

bullets.push({

x:player.x,
y:player.y,
vx:Math.cos(a)*6,
vy:Math.sin(a)*6,
team:"blue",
damage:15

})

}

}

function hyper(){

player.hyper=true

setTimeout(()=>{
player.hyper=false
},5000)

}

function ult(){

if(player.ult<100)return

player.ult=0

for(let i=0;i<40;i++){

let a=i*Math.PI*2/40

bullets.push({

x:player.x,
y:player.y,
vx:Math.cos(a)*7,
vy:Math.sin(a)*7,
team:"blue",
damage:35

})

}

}

function hitWall(x,y,s){

for(let w of walls){

if(x+s>w.x && x-s<w.x+w.w && y+s>w.y && y-s<w.y+w.h)
return true

}

return false

}

const bullets=[]
const enemies=[]

const walls=[

{x:200,y:150,w:200,h:40},
{x:500,y:100,w:40,h:300},
{x:700,y:200,w:250,h:40},
{x:850,y:350,w:40,h:250},
{x:300,y:450,w:300,h:40},
{x:1000,y:100,w:40,h:250}

]

let player
let score=0

function startGame(type){

document.getElementById("menu").style.display="none"
document.getElementById("ui").style.display="block"

player=new Character(200,300,"blue",type)

for(let i=0;i<6;i++)
enemies.push(new Character(900,100+i*90,"red","fast"))

gameLoop()

}

document.addEventListener("keydown",e=>{

if(!player)return

if(e.code=="Space" && player.reload<=0){

let target=autoAim()

if(target){

let dx=target.x-player.x
let dy=target.y-player.y

shoot(player,dx,dy)

player.reload=30

}

}

if(e.code=="KeyC")gadget()
if(e.code=="KeyB")hyper()
if(e.code=="KeyV")ult()

})

function updateBullets(){

bullets.forEach((b,i)=>{

b.x+=b.vx
b.y+=b.vy

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()

let targets=[player,...enemies]

targets.forEach(t=>{

if(t.team==b.team)return

if(Math.abs(b.x-t.x)<t.size && Math.abs(b.y-t.y)<t.size){

t.hp-=b.damage

bullets.splice(i,1)

player.ult+=8
if(player.ult>100)player.ult=100

if(t.hp<=0){

score++
scoreEl.textContent=score

t.x=800+Math.random()*200
t.y=Math.random()*600
t.hp=t.maxHp

}

}

})

})

}

function drawWalls(){

ctx.fillStyle="#64748b"

walls.forEach(w=>{
ctx.fillRect(w.x,w.y,w.w,w.h)
})

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawWalls()

player.move()
player.draw()

if(player.reload>0)player.reload--

reloadEl.textContent=player.reload
ultEl.textContent=Math.floor(player.ult)

enemies.forEach(e=>{

if(e.reload>0)e.reload--

e.ai()
e.draw()

})

updateBullets()

requestAnimationFrame(gameLoop)

}

</script>

</body>
</html>
