<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle Arena</title>

<style>

body{
margin:0;
background:#1e1e1e;
overflow:hidden;
font-family:sans-serif;
}

canvas{
background:#2d6a4f;
display:block;
margin:auto;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:16px;
}

</style>
</head>

<body>

<div id="ui"></div>

<canvas id="game" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

const keys = {};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);



class Character{

constructor(x,y,type,team){

this.x=x;
this.y=y;

this.team=team;
this.type=type;

this.size=40;

this.hp=200;
this.maxHp=200;

this.reload=3;
this.maxReload=3;

this.ult=0;
this.hyper=0;

this.lastDamage=0;

this.speed=2;

if(type==="tank"){
this.hp=400;
this.maxHp=400;
this.speed=1.4;
}

if(type==="speed"){
this.speed=3;
}

}

draw(){

let color="yellow";

if(this.type==="tank") color="#3a86ff";
if(this.type==="speed") color="#06d6a0";
if(this.type==="shooter") color="#ffd166";

ctx.fillStyle=color;

ctx.beginPath();
ctx.arc(this.x,this.y,this.size/2,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="white";
ctx.fillText(Math.floor(this.hp),this.x-12,this.y-25);

}

}



class Bullet{

constructor(x,y,vx,vy,team){

this.x=x;
this.y=y;

this.vx=vx;
this.vy=vy;

this.team=team;

this.size=6;

}

update(){

this.x+=this.vx;
this.y+=this.vy;

}

draw(){

ctx.fillStyle="orange";

ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();

}

}



const walls=[

{x:200,y:100,w:120,h:200},
{x:500,y:300,w:200,h:80},
{x:750,y:150,w:80,h:220},
{x:350,y:400,w:150,h:80},
{x:100,y:350,w:120,h:120}

];



function drawWalls(){

ctx.fillStyle="#555";

for(let w of walls){
ctx.fillRect(w.x,w.y,w.w,w.h);
}

}



function collideWall(x,y,size){

for(let w of walls){

if(
x+size/2>w.x &&
x-size/2<w.x+w.w &&
y+size/2>w.y &&
y-size/2<w.y+w.h
){
return true;
}

}

return false;

}



function randomSpawn(){

while(true){

let x=Math.random()*W;
let y=Math.random()*H;

if(!collideWall(x,y,40)) return {x,y};

}

}



const spawn=randomSpawn();

const player=new Character(spawn.x,spawn.y,"shooter","player");



const bots=[];

const types=["tank","speed","shooter"];

for(let i=0;i<6;i++){

let s=randomSpawn();

bots.push(new Character(
s.x,
s.y,
types[Math.floor(Math.random()*types.length)],
"enemy"
));

}



const bullets=[];



function shoot(shooter,target){

if(shooter.reload<=0) return;

let dx=target.x-shooter.x;
let dy=target.y-shooter.y;

let d=Math.hypot(dx,dy);

dx/=d;
dy/=d;

bullets.push(new Bullet(
shooter.x,
shooter.y,
dx*6,
dy*6,
shooter.team
));

shooter.reload--;

}



function autoAimTarget(){

let nearest=null;
let dist=9999;

for(let b of bots){

let d=Math.hypot(b.x-player.x,b.y-player.y);

if(d<dist){
dist=d;
nearest=b;
}

}

return nearest;

}



/* BOT AI */

function updateBots(){

for(let b of bots){

let dx = player.x - b.x;
let dy = player.y - b.y;

let dist = Math.hypot(dx,dy);

let moveX = 0;
let moveY = 0;

let r = Math.random();

/* 行動AI */

if(r < 0.35){

moveX = (Math.random()-0.5);
moveY = (Math.random()-0.5);

}
else if(r < 0.7){

moveX = dx/dist;
moveY = dy/dist;

}
else{

moveX = -dx/dist;
moveY = -dy/dist;

}

let nx = b.x + moveX * b.speed;
let ny = b.y + moveY * b.speed;

if(!collideWall(nx,ny,b.size)){
b.x = nx;
b.y = ny;
}

b.x = Math.max(20,Math.min(W-20,b.x));
b.y = Math.max(20,Math.min(H-20,b.y));

if(dist < 350 && Math.random() < 0.03){
shoot(b,player);
}

}

}



function updatePlayer(){

let sp=player.speed;

let nx=player.x;
let ny=player.y;

if(keys["w"]) ny-=sp;
if(keys["s"]) ny+=sp;
if(keys["a"]) nx-=sp;
if(keys["d"]) nx+=sp;

nx=Math.max(20,Math.min(W-20,nx));
ny=Math.max(20,Math.min(H-20,ny));

if(!collideWall(nx,ny,player.size)){
player.x=nx;
player.y=ny;
}

}



function updateBullets(){

for(let i=bullets.length-1;i>=0;i--){

let b=bullets[i];

b.update();

if(b.x<0||b.x>W||b.y<0||b.y>H){
bullets.splice(i,1);
continue;
}

if(collideWall(b.x,b.y,5)){
bullets.splice(i,1);
continue;
}

let targets=b.team==="player"?bots:[player];

for(let t of targets){

let d=Math.hypot(b.x-t.x,b.y-t.y);

if(d<20){

t.hp-=20;
t.lastDamage=Date.now();

if(b.team==="player") player.ult+=5;

bullets.splice(i,1);
break;

}

}

}

}



function regen(){

let now=Date.now();

for(let c of [player,...bots]){

if(now-c.lastDamage>3000){

c.hp=Math.min(c.maxHp,c.hp+0.17);

}

}

}



function reload(){

for(let c of [player,...bots]){

c.reload=Math.min(c.maxReload,c.reload+0.02);

}

}



function abilities(){

if(keys[" "]){
let t=autoAimTarget();
if(t) shoot(player,t);
}

if(keys["c"]){

player.hp=Math.min(player.maxHp,player.hp+40);

}

if(keys["v"] && player.ult>=100){

player.ult=0;

for(let b of bots){
b.hp-=80;
}

}

if(keys["b"] && player.hyper>=100){

player.hyper=0;

player.speed=5;

setTimeout(()=>player.speed=2,5000);

}

}



function draw(){

ctx.clearRect(0,0,W,H);

drawWalls();

player.draw();

for(let b of bots) b.draw();

for(let b of bullets) b.draw();

document.getElementById("ui").innerHTML=
"HP:"+Math.floor(player.hp)+"<br>"+
"Reload:"+player.reload.toFixed(1)+"<br>"+
"Ult:"+Math.floor(player.ult)+"%";

}



function loop(){

updatePlayer();

updateBots();

updateBullets();

regen();

reload();

abilities();

draw();

requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
