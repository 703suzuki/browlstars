
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle Arena</title>

<style>

body{
margin:0;
background:#1b1b1b;
overflow:hidden;
font-family:sans-serif;
}

#game{
background:#2e2e2e;
display:block;
margin:auto;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

.bar{
width:200px;
height:12px;
background:#444;
margin-top:4px;
}

.fill{
height:100%;
background:#00ff90;
}

</style>
</head>

<body>

<canvas id="game" width="1000" height="600"></canvas>

<div id="ui">
HP
<div class="bar"><div id="hpBar" class="fill"></div></div>

ULT
<div class="bar"><div id="ultBar" class="fill" style="background:orange"></div></div>

Reload
<div class="bar"><div id="reloadBar" class="fill" style="background:cyan"></div></div>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

function rand(a,b){return Math.random()*(b-a)+a}

class Character{

constructor(x,y,type,player=false){

this.x=x
this.y=y

this.type=type
this.player=player

this.radius=20

this.lastHit=0
this.reload=3
this.maxReload=3

this.ult=0

this.hp=100
this.maxHp=100

this.speed=2

this.img=new Image()

if(type=="tank"){
this.hp=160
this.maxHp=160
this.speed=1.5
this.img.src="https://i.imgur.com/Z7AzH2c.png"
}

if(type=="sniper"){
this.hp=80
this.maxHp=80
this.speed=2
this.img.src="https://i.imgur.com/W5qQX4G.png"
}

if(type=="speed"){
this.hp=90
this.maxHp=90
this.speed=3
this.img.src="https://i.imgur.com/qR8bQ8E.png"
}

}

draw(){

ctx.drawImage(this.img,this.x-20,this.y-20,40,40)

ctx.fillStyle="white"
ctx.font="12px sans-serif"
ctx.fillText(Math.floor(this.hp),this.x-12,this.y-25)

}

update(){

if(Date.now()-this.lastHit>3000){

this.hp=Math.min(this.maxHp,this.hp+0.1)

}

if(this.reload<this.maxReload){
this.reload+=0.02
}

}

}

class Bullet{

constructor(x,y,dx,dy,damage,owner){

this.x=x
this.y=y

this.dx=dx
this.dy=dy

this.damage=damage
this.owner=owner

this.r=5

}

update(){

this.x+=this.dx
this.y+=this.dy

}

draw(){

ctx.fillStyle="yellow"

ctx.beginPath()
ctx.arc(this.x,this.y,this.r,0,Math.PI*2)
ctx.fill()

}

}

const walls=[

{x:200,y:150,w:200,h:40},
{x:500,y:300,w:40,h:200},
{x:100,y:400,w:300,h:40},
{x:700,y:100,w:200,h:40},
{x:700,y:350,w:200,h:40}

]

function drawWalls(){

ctx.fillStyle="#555"

for(let w of walls){
ctx.fillRect(w.x,w.y,w.w,w.h)
}

}

function collideWall(x,y){

for(let w of walls){

if(x>w.x&&x<w.x+w.w&&y>w.y&&y<w.y+w.h)
return true

}

return false

}

function spawnPoint(){

while(true){

let x=rand(50,W-50)
let y=rand(50,H-50)

if(!collideWall(x,y))
return {x,y}

}

}

const player=new Character(200,200,"speed",true)

const bots=[]

const types=["tank","sniper","speed"]

for(let i=0;i<5;i++){

let p=spawnPoint()

bots.push(new Character(p.x,p.y,types[Math.floor(Math.random()*3)]))

}

const bullets=[]

function nearestEnemy(me){

let min=999999
let target=null

for(let b of bots){

let d=Math.hypot(b.x-me.x,b.y-me.y)

if(d<min){
min=d
target=b
}

}

return target

}

function shoot(char){

if(char.reload<1)return

let target=nearestEnemy(char)

if(!target)return

let dx=target.x-char.x
let dy=target.y-char.y

let d=Math.hypot(dx,dy)

dx/=d
dy/=d

let speed=6

if(char.type=="sniper")speed=9

bullets.push(new Bullet(char.x,char.y,dx*speed,dy*speed,20,char))

char.reload=0

}

document.addEventListener("keydown",e=>{

if(e.code=="Space")shoot(player)

if(e.key=="v"){
if(player.ult>=100){

for(let i=0;i<8;i++){

let a=i*Math.PI/4

bullets.push(new Bullet(player.x,player.y,Math.cos(a)*6,Math.sin(a)*6,25,player))

}

player.ult=0

}
}

if(e.key=="c"){
player.hp=Math.min(player.maxHp,player.hp+30)
}

if(e.key=="b"){
player.speed=5
setTimeout(()=>player.speed=2,3000)
}

})

function botAI(bot){

let target=player

let dx=target.x-bot.x
let dy=target.y-bot.y

let dist=Math.hypot(dx,dy)

if(dist<400){
dx/=dist
dy/=dist

bot.x+=dx*bot.speed
bot.y+=dy*bot.speed

}else{

bot.x+=rand(-1,1)*bot.speed
bot.y+=rand(-1,1)*bot.speed

}

if(Math.random()<0.01)shoot(bot)

}

function update(){

player.update()

for(let b of bots){

b.update()

botAI(b)

b.x=Math.max(20,Math.min(W-20,b.x))
b.y=Math.max(20,Math.min(H-20,b.y))

}

for(let bullet of bullets){

bullet.update()

}

for(let bullet of bullets){

for(let b of bots){

if(bullet.owner!=b){

let d=Math.hypot(bullet.x-b.x,bullet.y-b.y)

if(d<20){

b.hp-=bullet.damage

b.lastHit=Date.now()

player.ult+=5

bullet.dead=true

}

}

}

}

for(let bullet of bullets){

for(let w of walls){

if(bullet.x>w.x&&bullet.x<w.x+w.w&&bullet.y>w.y&&bullet.y<w.y+w.h){
bullet.dead=true
}

}

}

for(let i=bullets.length-1;i>=0;i--){
if(bullets[i].dead)bullets.splice(i,1)
}

}

function draw(){

ctx.clearRect(0,0,W,H)

drawWalls()

player.draw()

for(let b of bots)b.draw()

for(let bullet of bullets)bullet.draw()

document.getElementById("hpBar").style.width=(player.hp/player.maxHp*200)+"px"
document.getElementById("ultBar").style.width=(player.ult/100*200)+"px"
document.getElementById("reloadBar").style.width=(player.reload/3*200)+"px"

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
