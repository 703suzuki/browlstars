<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arena Battle</title>

<style>

body{
margin:0;
background:#0b1220;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:sans-serif;
color:white;
}

canvas{
background:#1e293b;
border:4px solid white;
}

#ui{
position:absolute;
top:10px;
left:10px;
font-size:18px;
}

#menu{
position:absolute;
text-align:center;
}

button{
padding:10px 20px;
margin:8px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="menu">
<h2>キャラクター選択</h2>
<button onclick="startGame('speed')">Speed</button>
<button onclick="startGame('tank')">Tank</button>
<button onclick="startGame('sniper')">Sniper</button>
<button onclick="startGame('shotgun')">Shotgun</button>
<button onclick="startGame('healer')">Healer</button>
<button onclick="startGame('blaster')">Blaster</button>
</div>

<div id="ui" style="display:none">
Score: <span id="score">0</span><br>
Reload: <span id="reload">0</span><br>
Ult: <span id="ult">0</span>
</div>

<canvas id="game" width="1200" height="700"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

const scoreEl=document.getElementById("score")
const reloadEl=document.getElementById("reload")
const ultEl=document.getElementById("ult")

let keys={}

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

class Character{

constructor(x,y,team,type){

this.x=x
this.y=y
this.team=team
this.type=type

this.reload=0
this.ult=0
this.hyper=false

this.lastDamage=0
this.healTick=0

if(type=="speed"){
this.size=20
this.speed=4
this.hp=90
this.damage=10
this.range=260
}

if(type=="tank"){
this.size=28
this.speed=2
this.hp=200
this.damage=16
this.range=200
}

if(type=="sniper"){
this.size=22
this.speed=2.6
this.hp=80
this.damage=32
this.range=500
}

if(type=="shotgun"){
this.size=22
this.speed=3
this.hp=120
this.damage=8
this.range=160
}

if(type=="healer"){
this.size=20
this.speed=3
this.hp=110
this.damage=10
this.range=240
}

if(type=="blaster"){
this.size=24
this.speed=2.8
this.hp=140
this.damage=20
this.range=300
}

this.maxHp=this.hp
this.dir=Math.random()*Math.PI*2
this.aiTimer=0

}

draw(){

ctx.save()
ctx.translate(this.x,this.y)

let body=this.team=="blue"?"#3b82f6":"#ef4444"

ctx.fillStyle=body
ctx.beginPath()
ctx.arc(0,0,this.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(-6,-4,3,0,Math.PI*2)
ctx.arc(6,-4,3,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.fillRect(-6,4,12,3)

ctx.fillStyle="#333"
ctx.fillRect(this.size-4,-3,12,6)

ctx.restore()

ctx.fillStyle="white"
ctx.fillText(Math.floor(this.hp),this.x-10,this.y-this.size-10)

}

heal(){

let now=Date.now()

if(now-this.lastDamage>3000){

this.healTick++

if(this.healTick>60){

this.hp=Math.min(this.maxHp,this.hp+10)

this.healTick=0

}

}

}

move(){

let nx=this.x
let ny=this.y

if(keys["KeyW"])ny-=this.speed
if(keys["KeyS"])ny+=this.speed
if(keys["KeyA"])nx-=this.speed
if(keys["KeyD"])nx+=this.speed

if(!hitWall(nx,ny,this.size)){

this.x=Math.max(this.size,Math.min(canvas.width-this.size,nx))
this.y=Math.max(this.size,Math.min(canvas.height-this.size,ny))

}

}

ai(){

let target=player

let dx=target.x-this.x
let dy=target.y-this.y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<this.range){

if(this.reload<=0){

shoot(this,dx,dy)

this.reload=50

}

}else{

this.aiTimer--

if(this.aiTimer<=0){

this.dir=Math.random()*Math.PI*2
this.aiTimer=80

}

let nx=this.x+Math.cos(this.dir)*this.speed
let ny=this.y+Math.sin(this.dir)*this.speed

if(!hitWall(nx,ny,this.size)){
this.x=nx
this.y=ny
}

}

}

}

function shoot(char,dx,dy){

let d=Math.sqrt(dx*dx+dy*dy)

bullets.push({

x:char.x,
y:char.y,
vx:dx/d*8,
vy:dy/d*8,
team:char.team,
damage:char.damage

})

}

function autoAim(){

let nearest=null
let dist=99999

enemies.forEach(e=>{

let d=Math.hypot(player.x-e.x,player.y-e.y)

if(d<dist){
dist=d
nearest=e
}

})

return nearest

}

function hitWall(x,y,s){

for(let w of walls){

if(x+s>w.x && x-s<w.x+w.w && y+s>w.y && y-s<w.y+w.h)
return true

}

return false

}

function randomSpawn(){

while(true){

let x=Math.random()*1100+50
let y=Math.random()*600+50

if(!hitWall(x,y,25)) return {x,y}

}

}

const bullets=[]
const enemies=[]

const walls=[

{x:200,y:150,w:300,h:40},
{x:600,y:120,w:40,h:300},
{x:800,y:300,w:300,h:40},
{x:300,y:450,w:400,h:40},
{x:950,y:100,w:40,h:250},
{x:100,y:350,w:200,h:40}

]

let player
let score=0

function startGame(type){

document.getElementById("menu").style.display="none"
document.getElementById("ui").style.display="block"

player=new Character(200,300,"blue",type)

for(let i=0;i<8;i++){

let pos=randomSpawn()

enemies.push(new Character(pos.x,pos.y,"red","speed"))

}

gameLoop()

}

document.addEventListener("keydown",e=>{

if(!player)return

if(e.code=="Space" && player.reload<=0){

let target=autoAim()

if(target){

let dx=target.x-player.x
let dy=target.y-player.y

shoot(player,dx,dy)

player.reload=30

}

}

})

function updateBullets(){

bullets.forEach((b,i)=>{

b.x+=b.vx
b.y+=b.vy

if(hitWall(b.x,b.y,2)){
bullets.splice(i,1)
return
}

ctx.fillStyle="yellow"
ctx.beginPath()
ctx.arc(b.x,b.y,4,0,Math.PI*2)
ctx.fill()

let targets=[player,...enemies]

targets.forEach(t=>{

if(t.team==b.team)return

if(Math.abs(b.x-t.x)<t.size && Math.abs(b.y-t.y)<t.size){

t.hp-=b.damage
t.lastDamage=Date.now()

bullets.splice(i,1)

player.ult+=8
if(player.ult>100)player.ult=100

if(t.hp<=0){

score++
scoreEl.textContent=score

let pos=randomSpawn()

t.x=pos.x
t.y=pos.y
t.hp=t.maxHp

}

}

})

})

}

function drawWalls(){

ctx.fillStyle="#64748b"

walls.forEach(w=>{
ctx.fillRect(w.x,w.y,w.w,w.h)
})

}

function gameLoop(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawWalls()

player.move()
player.heal()
player.draw()

if(player.reload>0)player.reload--

reloadEl.textContent=player.reload
ultEl.textContent=Math.floor(player.ult)

enemies.forEach(e=>{

if(e.reload>0)e.reload--

e.ai()
e.heal()
e.draw()

})

updateBullets()

requestAnimationFrame(gameLoop)

}

</script>

</body>
</html>
